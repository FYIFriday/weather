name: Ingest weather

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WEATHER_LAT: "42.9634"
          WEATHER_LON: "-85.6681"
          WEATHER_LOCATION: "grand_rapids"
          WEATHER_TZ: "America/Detroit"
        run: python scripts/ingest.py
